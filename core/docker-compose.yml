# Tollgate Notary — Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Local developer setup. One command to start, one command to stop.
#
# Prerequisites:
#   1. Run setup first:  docker-compose run --rm setup
#      This generates keyfiles in ./data/ and writes .env
#
#   2. Edit .env and fill in:
#      CHAIN_ID=84532
#      GUARD_CONTRACT_ADDRESS=0x...
#      SAFE_ADDRESS=0x...
#
#   3. Start the Notary:  docker-compose up notary
#
# Usage:
#   docker-compose run --rm setup          # first-time setup (generates keys)
#   docker-compose up notary               # start the Notary
#   docker-compose up notary -d            # start in background
#   docker-compose logs -f notary          # tail logs
#   docker-compose down                    # stop and remove containers
#   docker-compose down -v                 # stop and remove containers + volumes
#
# SECURITY:
#   - Keys live in ./data/ on the host — never inside the image.
#   - .env is mounted read-only — never baked in.
#   - The container runs as uid 1001 (non-root).
#   - No ports other than 8080 are exposed.

version: "3.9"

services:

  # ── notary ───────────────────────────────────────────────────────────────────
  # The Tollgate Notary — policy engine + signing service + audit log.
  notary:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: tollgate-notary

    # Load all config from .env — generated by the setup service.
    # .env is read by Docker Compose and injected as environment variables.
    # SECURITY: .env is never copied into the image — injected at runtime only.
    env_file:
      - .env

    ports:
      # Expose the Notary HTTP API on localhost only.
      # 127.0.0.1:8080 — not 0.0.0.0:8080 — prevents external access.
      # Change to 8080:8080 only if you need LAN access (e.g. testing from another device).
      - "127.0.0.1:8080:8080"

    volumes:
      # Keyfiles and audit database — persisted on the host.
      # SECURITY: These contain your private keys. Keep ./data/ in .gitignore.
      - ./data:/data

      # Policy file — edit on the host, hot-reloaded by the Notary.
      # Mount as read-only inside the container — the Notary only reads this.
      - ./policies:/policies:ro

      # Logs — optional, useful for debugging.
      - ./logs:/logs

    # Restart policy for local development.
    # "unless-stopped" means it restarts on crash but not on docker-compose down.
    restart: unless-stopped

    # Health check matches the HEALTHCHECK in Dockerfile.
    # docker-compose ps will show "healthy" when the Notary is ready.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # Logging — keep logs manageable for local development.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── setup ────────────────────────────────────────────────────────────────────
  # One-shot service that generates keys and writes .env.
  # Run with: docker-compose run --rm setup
  # It exits after completing — it does not stay running.
  #
  # This runs go run ./cmd/setup inside a Go build container so the developer
  # doesn't need Go installed locally to run setup.
  setup:
    image: golang:1.26-alpine

    container_name: tollgate-setup

    working_dir: /src

    volumes:
      # Mount the full source so setup can build and run.
      - .:/src

      # Mount data directory so setup can write keyfiles.
      - ./data:/src/data

    # Run setup — generates keys if they don't exist.
    # --force flag overwrites existing keys (for key rotation).
    command: >
      sh -c "
        apk add --no-cache git &&
        go run ./cmd/setup
      "

    # Setup never restarts — it runs once and exits.
    restart: "no"

    # Don't start setup automatically — only when explicitly run.
    profiles:
      - setup